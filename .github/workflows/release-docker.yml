# GitHub Actions workflow to build and push Docker images on release publishing.
# Triggers when a GitHub release is created and published.
name: Build and Push Docker Images

on:
  release:
    types: [published]

permissions:
  contents: read
  packages: write

jobs:
  build-and-push:
    name: Build & Push to GHCR
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Get version from VERSION file
        id: get_version
        run: |
          # Fallback to VERSION file if tag_name is not provided by the trigger event
          TAG_NAME="${{ github.event.release.tag_name }}"
          if [ -z "$TAG_NAME" ]; then
            if [ ! -f VERSION ]; then
              echo "ERROR: VERSION file not found"
              exit 1
            fi
            TAG_NAME=$(cat VERSION | tr -d '\r\n\t ')
          fi
          
          # Clean up prefix/whitespace
          RAW_VERSION=$(echo "$TAG_NAME" | sed 's/^v//' | tr -d '\r\n\t ')
          V_VERSION="v${RAW_VERSION}"
          
          echo "version=${RAW_VERSION}" >> $GITHUB_OUTPUT
          echo "v_version=${V_VERSION}" >> $GITHUB_OUTPUT
          echo "Extracted Raw Version: ${RAW_VERSION}"
          echo "Extracted V-Prefixed Version: ${V_VERSION}"

      - name: Lowercase registry namespace
        id: prep
        run: |
          # GHCR requires lowercase registry paths
          OWNER=$(echo "${{ github.repository_owner }}" | tr '[:upper:]' '[:lower:]')
          echo "owner=${OWNER}" >> $GITHUB_OUTPUT

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # ── Backend Build ──
      - name: Build and push Backend Image
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          file: ./backend/Dockerfile
          push: true
          tags: |
            ghcr.io/${{ steps.prep.outputs.owner }}/sarnfund-backend:${{ steps.get_version.outputs.version }}
            ghcr.io/${{ steps.prep.outputs.owner }}/sarnfund-backend:${{ steps.get_version.outputs.v_version }}
            ghcr.io/${{ steps.prep.outputs.owner }}/sarnfund-backend:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # ── Frontend Build ──
      - name: Build and push Frontend Builder Image
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          file: ./frontend/Dockerfile
          push: true
          tags: |
            ghcr.io/${{ steps.prep.outputs.owner }}/sarnfund-frontend-builder:${{ steps.get_version.outputs.version }}
            ghcr.io/${{ steps.prep.outputs.owner }}/sarnfund-frontend-builder:${{ steps.get_version.outputs.v_version }}
            ghcr.io/${{ steps.prep.outputs.owner }}/sarnfund-frontend-builder:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
